spring.application.name=boarding-house-api
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/boarding_house_db}

jwt.secret=${JWT_SECRET:your_super_secret_key_at_least_32_chars_for_local_dev}
jwt.expiration=${JWT_EXPIRATION:604800000}

owner.seed.email=${OWNER_SEED_EMAIL:owner@gmail.com}
owner.seed.password=${OWNER_SEED_PASSWORD:123456}
owner.seed.name=${OWNER_SEED_NAME:Chu Tro}

payos.client-id=${PAYOS_CLIENT_ID:test}
payos.api-key=${PAYOS_API_KEY:test}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:test}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:3000/payment-success}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:3000/payment-cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8080/api/webhooks/payos}
